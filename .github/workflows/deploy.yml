name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build (static prerender)
        continue-on-error: true
        run: bun run build
        env:
          NITRO_PRESET: static
          VITE_BASE: /useful-tooling/

      - name: Verify static output
        run: |
          test -f .output/public/index.html || (echo "Static build failed to produce index.html" && exit 1)
          echo "Static files ready"
          ls .output/public/

      - run: cp .output/public/index.html .output/public/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

      - id: deployment
        uses: actions/deploy-pages@v4
