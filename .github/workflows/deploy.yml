name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_BASE: /useful-tooling/

      - name: Generate index.html from SSR server
        run: |
          bun .output/server/index.mjs &
          sleep 3
          curl -sf http://localhost:3000/useful-tooling/ -o .output/public/index.html
          cp .output/public/index.html .output/public/404.html
          echo "Files in .output/public:"
          ls .output/public/
        env:
          NITRO_PORT: 3000

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

      - id: deployment
        uses: actions/deploy-pages@v4
